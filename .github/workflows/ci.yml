name: CI — Verificacao de Qualidade

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint-and-test:
    runs-on: ubuntu-22.04
    name: Lint + Tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check (frontend)
        run: npx tsc --noEmit

      - name: TypeScript check (sidecar)
        run: npm run sidecar:check

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Unit + component tests
        run: npm test

  rust-check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            label: Windows
          - platform: macos-latest
            label: macOS
          - platform: ubuntu-22.04
            label: Linux

    runs-on: ${{ matrix.platform }}
    name: Rust — ${{ matrix.label }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      # Placeholders para resources e externalBin — tauri_build::build() valida estes caminhos
      - name: Create resource placeholders
        shell: bash
        run: |
          mkdir -p sidecar/dist
          touch sidecar/dist/nexora-sidecar.cjs
          mkdir -p src-tauri/binaries
          if [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            touch src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe
            touch src-tauri/binaries/ffprobe-x86_64-pc-windows-msvc.exe
          elif [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
            touch src-tauri/binaries/ffmpeg-aarch64-apple-darwin
            touch src-tauri/binaries/ffprobe-aarch64-apple-darwin
            touch src-tauri/binaries/ffmpeg-x86_64-apple-darwin
            touch src-tauri/binaries/ffprobe-x86_64-apple-darwin
            touch src-tauri/binaries/ffmpeg-universal-apple-darwin
            touch src-tauri/binaries/ffprobe-universal-apple-darwin
          else
            touch src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu
            touch src-tauri/binaries/ffprobe-x86_64-unknown-linux-gnu
          fi

      - name: Rust format check
        if: matrix.platform == 'ubuntu-22.04'
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Rust clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Rust tests
        if: matrix.platform == 'ubuntu-22.04'
        working-directory: src-tauri
        run: cargo test
