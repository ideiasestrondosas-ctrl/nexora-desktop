name: Build Nexora Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_draft:
        description: 'Criar release como draft?'
        required: false
        default: 'true'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            label: Windows
            rust-targets: x86_64-pc-windows-msvc
            bundles: msi,nsis

          - platform: macos-latest
            label: macOS (Universal)
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            bundles: dmg,app
            args: --target universal-apple-darwin

          - platform: ubuntu-22.04
            label: Linux
            rust-targets: x86_64-unknown-linux-gnu
            bundles: deb,appimage

    runs-on: ${{ matrix.platform }}
    name: Build — ${{ matrix.label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # Dependencias nativas do Linux (WebKitGTK para Tauri 2.x)
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev

      - name: Install frontend dependencies
        run: npm install

      # Descarregar FFmpeg e FFprobe para a plataforma alvo
      - name: Download media binaries
        run: node scripts/download-media-binaries.js

      # Build do sidecar Node.js
      - name: Build sidecar
        run: npm run sidecar:build

      # Build + empacotamento por plataforma
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Assinatura de actualizações (tauri-plugin-updater)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Assinar no macOS (opcional - configura nos secrets do repo)
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Nexora Desktop ${{ github.ref_name }}'
          releaseBody: |
            ## Nexora Desktop ${{ github.ref_name }}

            ### Instaladores

            | Plataforma | Ficheiro |
            |---|---|
            | Windows | `.msi` ou `.exe` (NSIS) |
            | macOS | `.dmg` (Universal: Intel + Apple Silicon) |
            | Linux | `.deb` (Debian/Ubuntu) ou `.AppImage` |

            Consulta o [CHANGELOG.md](CHANGELOG.md) para detalhes das alteracoes.
          releaseDraft: ${{ github.event.inputs.release_draft != 'false' }}
          prerelease: false
          args: ${{ matrix.args }}
          includeUpdaterJson: true
