name: Build Nexora Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_draft:
        description: 'Criar release como draft?'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  quality-gate:
    runs-on: ubuntu-22.04
    name: Quality Gate

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check (frontend)
        run: npx tsc --noEmit

      - name: TypeScript check (sidecar)
        run: npm run sidecar:check

      - name: ESLint
        run: npm run lint

      - name: Unit + component tests
        run: npm test

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      # Placeholders para resources e externalBin — tauri_build::build() valida estes caminhos
      - name: Create resource placeholders
        shell: bash
        run: |
          mkdir -p sidecar/dist
          touch sidecar/dist/nexora-sidecar.cjs
          mkdir -p src-tauri/binaries
          touch src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu
          touch src-tauri/binaries/ffprobe-x86_64-unknown-linux-gnu

      - name: Rust format check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Rust clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

  build:
    needs: quality-gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            label: Windows
            rust-targets: x86_64-pc-windows-msvc

          - platform: macos-latest
            label: macOS (Universal)
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target universal-apple-darwin

          - platform: ubuntu-22.04
            label: Linux
            rust-targets: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}
    name: Build — ${{ matrix.label }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # Dependencias nativas do Linux (WebKitGTK para Tauri 2.x)
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev

      # Placeholders para resources e externalBin — tauri_build::build() valida estes caminhos
      - name: Create resource placeholders
        shell: bash
        run: |
          mkdir -p sidecar/dist
          touch sidecar/dist/nexora-sidecar.cjs
          mkdir -p src-tauri/binaries
          if [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            touch src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe
            touch src-tauri/binaries/ffprobe-x86_64-pc-windows-msvc.exe
          elif [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
            touch src-tauri/binaries/ffmpeg-aarch64-apple-darwin
            touch src-tauri/binaries/ffprobe-aarch64-apple-darwin
            touch src-tauri/binaries/ffmpeg-x86_64-apple-darwin
            touch src-tauri/binaries/ffprobe-x86_64-apple-darwin
            touch src-tauri/binaries/ffmpeg-universal-apple-darwin
            touch src-tauri/binaries/ffprobe-universal-apple-darwin
          else
            touch src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu
            touch src-tauri/binaries/ffprobe-x86_64-unknown-linux-gnu
          fi

      - name: Install frontend dependencies
        run: npm ci

      # Descarregar FFmpeg e FFprobe para a plataforma alvo
      - name: Download media binaries
        run: node scripts/download-media-binaries.js

      # Build do sidecar Node.js
      - name: Build sidecar
        run: npm run sidecar:build

      # Build + empacotamento por plataforma
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Assinatura de actualizações (tauri-plugin-updater)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Nexora Desktop ${{ github.ref_name }}'
          releaseBody: |
            ## Nexora Desktop ${{ github.ref_name }}

            ### Instaladores

            | Plataforma | Ficheiro |
            |---|---|
            | Windows | `.msi` ou `.exe` (NSIS) |
            | macOS | `.dmg` (Universal: Intel + Apple Silicon) |
            | Linux | `.deb` (Debian/Ubuntu) ou `.AppImage` |

            Consulta o [CHANGELOG.md](CHANGELOG.md) para detalhes das alteracoes.
          releaseDraft: ${{ github.event.inputs.release_draft != 'false' }}
          prerelease: false
          args: ${{ matrix.args }}
