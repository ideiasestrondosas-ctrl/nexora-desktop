version: 2

updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    groups:
      tauri-plugins:
        patterns:
          - '@tauri-apps/*'
      radix-ui:
        patterns:
          - '@radix-ui/*'
      testing:
        patterns:
          - '@testing-library/*'
          - 'vitest'
          - '@vitest/*'
      typescript-eslint:
        patterns:
          - '@typescript-eslint/*'
          - 'eslint*'

  - package-ecosystem: 'cargo'
    directory: '/src-tauri'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 3
